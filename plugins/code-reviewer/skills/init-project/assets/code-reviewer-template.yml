# .code-reviewer.yml — Generated by /init-project
# Project-level configuration for the /code-reviewer skill.
#
# The code-reviewer skill reads this file to determine which PE references
# to load and which test commands to run for each part of the codebase.
#
# Regenerate with: /init-project

version: "1.0"

# Project metadata
project:
  name: "{PROJECT_NAME}"
  generated_at: "{YYYY-MM-DD}"

# Stack Map — maps directory paths to stacks and PE types.
# The code-reviewer skill uses this to route diff files to the right PE.
stacks:
  # - paths: glob patterns for directories/files belonging to this stack
  #   stack: human-readable stack name
  #   pe: PE reference file to load (references/pe-<type>.md)
  #   test_commands: commands to run during Quality pass
  #
  # Example:
  # - paths: ["lambdas/**", "pkg/**", "cmd/**"]
  #   stack: Go
  #   pe: pe-backend
  #   test_commands:
  #     - "go vet ./..."
  #     - "go test ./... -count=1 -race"

  - paths: ["{PATHS}"]
    stack: "{STACK}"
    pe: "{PE_TYPE}"
    test_commands:
      - "{TEST_CMD}"

# Review settings
settings:
  # Lines changed threshold for sub-agent dispatch
  sub_agent_threshold: 200

  # Output directory for review documents
  output_dir: "docs/code-reviews"

  # Verdict strictness
  # strict: MEDIUM and above block merge (default)
  # standard: only CRITICAL/HIGH block merge
  verdict_mode: "strict"

  # Commit review document to branch automatically
  auto_commit: true
